# Caravee Camel Runtime — configuration

# HTTP port (agent sidecar listens on 8090 by convention)
quarkus.http.port=8090

# Health: /observe/health/live + /observe/health/ready
quarkus.smallrye-health.root-path=/observe/health

# Metrics: /observe/metrics (Prometheus format)
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/observe/metrics

# Route hot-reload: watches /data/routes/*.yaml
camel.main.routes-include-pattern=file:/data/routes/*.yaml
camel.main.routes-reload-enabled=true
camel.main.routes-reload-directory=/data/routes

# Kamelet catalog: built-in classpath + runtime /data/kamelets directory
camel.component.kamelet.location=classpath:kamelets,file:/data/kamelets

# Route-level metrics (requires camel-micrometer-prometheus on classpath)
# camel.metrics.enable-route-event-notifier=true

# OpenTelemetry disabled by default
quarkus.otel.sdk.disabled=true

# PostgreSQL (optional — configured via env vars)
# QUARKUS_DATASOURCE_JDBC_URL, QUARKUS_DATASOURCE_USERNAME, QUARKUS_DATASOURCE_PASSWORD
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=false

quarkus.log.level=INFO
quarkus.log.category."org.apache.camel".level=INFO
